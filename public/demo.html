<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<title>LinkMágico Demo — Chat IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#07142B;--bg-dark:#020617;--surface:rgba(10,20,40,0.7);--primary:#1E6BFF;--glow:#7B61FF;--green:#2BE66A;--text:#c8d6e5;--text-bright:#f0f4ff;--text-muted:#6b7c93;--font:'Inter',system-ui,sans-serif}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font);background:linear-gradient(180deg,var(--bg),var(--bg-dark));color:var(--text)}
.app{display:flex;flex-direction:column;height:100vh;height:100dvh;max-width:520px;margin:0 auto;position:relative}

/* HEADER */
.header{padding:14px 18px;display:flex;align-items:center;gap:12px;border-bottom:1px solid rgba(100,150,255,0.15);background:linear-gradient(135deg,rgba(30,107,255,0.12),rgba(123,97,255,0.06));backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);flex-shrink:0;z-index:10}
.h-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--glow));display:flex;align-items:center;justify-content:center;font-size:.8rem;color:#fff;font-weight:700;box-shadow:0 0 15px rgba(30,107,255,0.4);flex-shrink:0}
.h-info{flex:1;min-width:0}
.h-name{font-weight:600;color:var(--text-bright);font-size:.9rem}
.h-status{font-size:.68rem;color:var(--green);display:flex;align-items:center;gap:4px}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(43,230,106,.6)}50%{box-shadow:0 0 0 5px rgba(43,230,106,0)}}
.h-status::before{content:'';width:6px;height:6px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
.h-page{font-size:.65rem;color:var(--text-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:150px}
.h-close{color:var(--text-muted);text-decoration:none;font-size:1.1rem;padding:8px;flex-shrink:0}

/* PROGRESS */
.progress{padding:6px 18px;background:rgba(5,10,25,0.6);border-bottom:1px solid rgba(100,150,255,0.08);flex-shrink:0;display:flex;align-items:center;gap:10px}
.progress-bar{flex:1;height:3px;border-radius:2px;background:rgba(100,150,255,0.1);overflow:hidden}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--green),#00FF94);border-radius:2px;transition:width .5s ease;width:0%}
.progress-text{font-size:.62rem;color:var(--text-muted);white-space:nowrap}
.progress-time{font-size:.62rem;color:var(--text-muted);white-space:nowrap}

/* CHAT */
.chat-body{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:8px;scroll-behavior:smooth;-webkit-overflow-scrolling:touch}
@keyframes msgIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg{max-width:85%;padding:12px 16px;border-radius:18px;font-size:.88rem;line-height:1.65;animation:msgIn .3s ease;white-space:pre-line;word-wrap:break-word;overflow-wrap:break-word}
.msg.ai{background:rgba(30,60,120,0.5);border:1px solid rgba(100,150,255,0.12);color:var(--text);align-self:flex-start;border-bottom-left-radius:4px}
.msg.user{background:rgba(255,255,255,0.08);color:var(--text-bright);align-self:flex-end;border-bottom-right-radius:4px}
.msg.system{background:rgba(43,230,106,0.06);border:1px solid rgba(43,230,106,0.15);color:var(--text-muted);font-size:.78rem;text-align:center;align-self:center;border-radius:12px;max-width:95%}

/* TYPING */
@keyframes typeDot{0%,60%,100%{opacity:.3;transform:translateY(0)}30%{opacity:1;transform:translateY(-4px)}}
.typing{align-self:flex-start;padding:12px 18px;background:rgba(30,60,120,0.35);border:1px solid rgba(100,150,255,0.08);border-radius:18px;border-bottom-left-radius:4px;display:flex;gap:5px}
.typing span{width:7px;height:7px;border-radius:50%;background:var(--primary);animation:typeDot 1.2s infinite}
.typing span:nth-child(2){animation-delay:.2s}
.typing span:nth-child(3){animation-delay:.4s}

/* BUTTONS */
.chat-btns{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px}
.chat-btn{padding:8px 14px;border-radius:20px;border:1px solid rgba(30,107,255,0.3);background:rgba(30,107,255,0.1);color:var(--primary);font-size:.78rem;font-weight:600;cursor:pointer;font-family:var(--font);transition:all .2s;line-height:1.4;text-align:center}
.chat-btn:hover{background:rgba(30,107,255,0.25);border-color:var(--primary);box-shadow:0 0 10px rgba(30,107,255,0.2)}
.chat-btn:active{transform:scale(0.96)}
.chat-btn.cta{background:linear-gradient(90deg,var(--green),#00FF94);color:#0a2e14;border:none;font-weight:700;box-shadow:0 0 15px rgba(43,230,106,0.3)}
.chat-btn.cta:hover{box-shadow:0 0 25px rgba(43,230,106,0.5);transform:translateY(-1px)}
.standalone-btns{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;padding:8px 0;animation:msgIn .4s ease}
.standalone-btns .chat-btn{padding:10px 18px;font-size:.82rem}

/* INPUT */
.input-area{padding:12px 18px;border-top:1px solid rgba(100,150,255,0.1);background:rgba(5,10,25,0.8);flex-shrink:0;display:flex;gap:10px;align-items:center}
.input-field{flex:1;padding:12px 16px;border-radius:24px;border:1px solid rgba(100,150,255,0.15);background:rgba(10,20,40,0.6);color:var(--text-bright);font-family:var(--font);font-size:.88rem;outline:none;transition:border-color .2s;min-width:0}
.input-field:focus{border-color:var(--primary)}
.input-field::placeholder{color:var(--text-muted)}
.send-btn{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--primary),var(--glow));border:none;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:1rem;transition:all .2s;flex-shrink:0}
.send-btn:hover{transform:scale(1.08);box-shadow:0 0 20px rgba(30,107,255,0.4)}
.send-btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

/* LIMIT */
.limit-overlay{display:none;position:absolute;inset:0;background:rgba(2,6,23,0.95);backdrop-filter:blur(10px);z-index:100;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:30px;animation:msgIn .5s ease}
.limit-overlay.show{display:flex}
.limit-icon{font-size:3rem;color:var(--primary);margin-bottom:20px}
.limit-title{font-size:1.3rem;font-weight:800;color:var(--text-bright);margin-bottom:12px;line-height:1.3}
.limit-text{font-size:.92rem;color:var(--text-muted);margin-bottom:24px;line-height:1.7;max-width:400px}
.limit-cta{padding:16px 36px;border-radius:14px;background:linear-gradient(90deg,var(--green),#00FF94);color:#0a2e14;font-weight:700;font-size:1rem;border:none;cursor:pointer;font-family:var(--font);text-decoration:none;display:inline-block;box-shadow:0 0 30px rgba(43,230,106,0.4);transition:all .3s}
.limit-cta:hover{transform:translateY(-3px);box-shadow:0 0 50px rgba(43,230,106,0.6)}
.limit-sub{font-size:.72rem;color:var(--text-muted);margin-top:12px}

/* RESPONSIVE */
@media(min-width:521px) and (max-width:1024px){.app{max-width:600px}.msg{max-width:80%;font-size:.9rem}.standalone-btns .chat-btn{padding:12px 22px;font-size:.85rem}}
@media(max-width:380px){.header{padding:10px 14px;gap:8px}.h-avatar{width:32px;height:32px;font-size:.7rem}.chat-body{padding:12px 14px;gap:6px}.msg{padding:10px 13px;font-size:.82rem;max-width:90%}.chat-btn{padding:7px 12px;font-size:.72rem}.standalone-btns .chat-btn{padding:9px 16px;font-size:.78rem}.input-area{padding:10px 14px;gap:8px}.input-field{padding:10px 14px;font-size:.82rem}.send-btn{width:38px;height:38px;font-size:.9rem}}
@supports(padding-bottom:env(safe-area-inset-bottom)){.input-area{padding-bottom:calc(12px + env(safe-area-inset-bottom))}}
</style>
</head>
<body>
<div class="app" id="app">
<div class="header">
<div class="h-avatar">IA</div>
<div class="h-info"><div class="h-name">Assistente IA</div><div class="h-status">Online</div></div>
<div class="h-page" id="pageName"></div>
<a href="/" class="h-close"><i class="fas fa-times"></i></a>
</div>
<div class="progress">
<div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
<div class="progress-text" id="progressText">0/20</div>
<div class="progress-time" id="progressTime">30 min</div>
</div>
<div class="chat-body" id="chatBody"></div>
<div class="input-area" id="inputArea">
<input type="text" class="input-field" id="msgInput" placeholder="Digite sua mensagem..." autocomplete="off">
<button class="send-btn" id="sendBtn"><i class="fas fa-paper-plane"></i></button>
</div>
<div class="limit-overlay" id="limitOverlay">
<div class="limit-icon"><i class="fas fa-lock"></i></div>
<div class="limit-title">Este teste atingiu o limite de demonstração</div>
<div class="limit-text">Para usar com visitantes reais e ilimitados, ative seu LinkMágico completo.</div>
<a class="limit-cta" id="limitCta" href="#" target="_blank"><i class="fas fa-wand-magic-sparkles"></i> Ativar meu LinkMágico</a>
<div class="limit-sub">Menos de R$97/ano · Sem mensalidade</div>
</div>
</div>

<script>
(function() {
    var SESSION_ID = window.location.pathname.split('/demo/')[1];
    if (!SESSION_ID) { window.location.href = '/'; return; }

    var chatBody = document.getElementById('chatBody');
    var msgInput = document.getElementById('msgInput');
    var sendBtn = document.getElementById('sendBtn');
    var progressFill = document.getElementById('progressFill');
    var progressText = document.getElementById('progressText');
    var progressTime = document.getElementById('progressTime');
    var limitOverlay = document.getElementById('limitOverlay');
    var limitCta = document.getElementById('limitCta');
    var pageName = document.getElementById('pageName');
    var sending = false;
    var messageCount = 0;
    var hotmartLink = 'https://pay.hotmart.com/G103177435I';

    // ===== CARREGAR SESSÃO =====
    fetch('/api/session/' + SESSION_ID)
        .then(function(r) { return r.json(); })
        .then(function(data) {
            if (!data.success) { showLimit('Demonstração não encontrada ou expirada.'); return; }
            pageName.textContent = data.session.title || data.session.url;
            hotmartLink = data.session.hotmartLink || hotmartLink;
            limitCta.href = hotmartLink;
            updateProgress(data.session.messageCount || 0, data.session.maxMessages, data.session.remainingMinutes);

            addSystemMsg('🔗 Demonstração ativa — ' + (data.session.title || 'Página'));

            // ===== ABERTURA FIXA =====
            setTimeout(function() {
                addAI('Você acabou de ver isso funcionando na prática.');
                setTimeout(function() {
                    addAI('Agora me diz uma coisa — se isso estivesse rodando no seu link hoje, faria diferença nas suas vendas?');
                    setTimeout(function() {
                        showButtons([
                            { text: '✅ Sim, com certeza', action: 'path_sim' },
                            { text: '🤔 Talvez, quero entender melhor', action: 'path_talvez' }
                        ]);
                    }, 400);
                }, 1200);
            }, 800);
        })
        .catch(function() { showLimit('Erro ao carregar demonstração.'); });

    // Timer
    var timerInterval = setInterval(function() {
        if (sending) return;
        fetch('/api/session/' + SESSION_ID)
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (!data.success || data.session.isExpired) { clearInterval(timerInterval); showLimit(); return; }
                updateProgress(data.session.messageCount, data.session.maxMessages, data.session.remainingMinutes);
            });
    }, 30000);

    // ===== HELPERS =====
    function updateProgress(count, max, mins) {
        var pct = Math.min(100, (count / max) * 100);
        progressFill.style.width = pct + '%';
        if (pct > 70) progressFill.style.background = 'linear-gradient(90deg,#ff6b6b,#ef4444)';
        progressText.textContent = count + '/' + max;
        if (mins !== undefined) progressTime.textContent = mins + ' min';
    }

    function addUser(text) {
        var d = document.createElement('div');
        d.className = 'msg user';
        d.textContent = text;
        chatBody.appendChild(d);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function addSystemMsg(text) {
        var d = document.createElement('div');
        d.className = 'msg system';
        d.innerHTML = text;
        chatBody.appendChild(d);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function addAI(text, buttons) {
        var d = document.createElement('div');
        d.className = 'msg ai';
        d.textContent = text;
        if (buttons && buttons.length > 0) {
            var bc = document.createElement('div');
            bc.className = 'chat-btns';
            buttons.forEach(function(b) {
                var btn = document.createElement('button');
                btn.className = 'chat-btn' + (b.cta ? ' cta' : '');
                btn.innerHTML = b.text;
                btn.onclick = function() {
                    if (b.url) window.open(b.url, '_blank');
                    else sendMessage(b.text);
                };
                bc.appendChild(btn);
            });
            d.appendChild(bc);
        }
        chatBody.appendChild(d);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function showButtons(buttons) {
        var wrap = document.createElement('div');
        wrap.className = 'standalone-btns';
        buttons.forEach(function(b) {
            var btn = document.createElement('button');
            btn.className = 'chat-btn' + (b.cta ? ' cta' : '');
            btn.innerHTML = b.text;
            btn.onclick = function() {
                wrap.querySelectorAll('.chat-btn').forEach(function(x) { x.disabled = true; x.style.opacity = '0.4'; x.style.pointerEvents = 'none'; });
                btn.style.opacity = '1';
                if (b.url) { window.open(b.url, '_blank'); }
                else if (b.action) { handleAction(b.action, b.text); }
                else { sendMessage(b.text); }
            };
            wrap.appendChild(btn);
        });
        chatBody.appendChild(wrap);
        chatBody.scrollTop = chatBody.scrollHeight;
    }

    function typing(callback) {
        var d = document.createElement('div');
        d.className = 'typing'; d.id = 'typingIndicator';
        d.innerHTML = '<span></span><span></span><span></span>';
        chatBody.appendChild(d);
        chatBody.scrollTop = chatBody.scrollHeight;
        var delay = 800 + Math.random() * 600;
        setTimeout(function() {
            var t = document.getElementById('typingIndicator');
            if (t) t.remove();
            callback();
        }, delay);
    }

    function showLimit(msg) {
        if (msg) document.querySelector('.limit-text').textContent = msg;
        limitOverlay.classList.add('show');
        msgInput.disabled = true; sendBtn.disabled = true;
    }

    // ===== FLUXO GUIADO — CLOSER =====
    function handleAction(action, displayText) {
        // Mostrar escolha do usuário
        addUser(displayText.replace(/^[✅🤔💡🚀⚡💣🔥]+\s*/g, ''));

        switch(action) {

            // ===== CAMINHO 1: SIM =====
            case 'path_sim':
                setTimeout(function() { typing(function() {
                    addAI('Então você já entendeu o ponto.');
                    setTimeout(function() { typing(function() {
                        addAI('A maioria das pessoas perde vendas porque o visitante chega, tem dúvida e vai embora sem resposta.');
                        setTimeout(function() { typing(function() {
                            addAI('O que você acabou de ver resolve exatamente isso. Agora a única pergunta é: você quer isso funcionando no seu link ou vai continuar perdendo essas oportunidades?');
                            setTimeout(function() {
                                showButtons([
                                    { text: '🚀 Quero isso no meu link', action: 'pre_close', cta: true },
                                    { text: '💡 Ainda tenho dúvidas', action: 'doubts' }
                                ]);
                            }, 400);
                        }); }, 600);
                    }); }, 600);
                }); }, 300);
                break;

            // ===== CAMINHO 2: TALVEZ =====
            case 'path_talvez':
                setTimeout(function() { typing(function() {
                    addAI('Perfeito. Então deixa eu simplificar:');
                    setTimeout(function() { typing(function() {
                        addAI('Isso aqui transforma visitantes indecisos em pessoas sendo guiadas até a decisão. Foi exatamente isso que você viu.');
                        setTimeout(function() { typing(function() {
                            addAI('Isso se aplica ao seu caso hoje?');
                            setTimeout(function() {
                                showButtons([
                                    { text: '✅ Sim, faz sentido', action: 'pre_close' },
                                    { text: '🤔 Ainda não tenho certeza', action: 'not_sure' }
                                ]);
                            }, 400);
                        }); }, 600);
                    }); }, 600);
                }); }, 300);
                break;

            // ===== "NÃO SEI" =====
            case 'not_sure':
                setTimeout(function() { typing(function() {
                    addAI('Você já viu funcionando. Então não é falta de clareza.');
                    setTimeout(function() { typing(function() {
                        addAI('É só uma decisão agora: isso faz sentido pro seu cenário ou não?');
                        setTimeout(function() {
                            showButtons([
                                { text: '✅ Faz sentido', action: 'pre_close' },
                                { text: '💡 Ainda tenho dúvidas', action: 'doubts' }
                            ]);
                        }, 400);
                    }); }, 600);
                }); }, 300);
                break;

            // ===== DÚVIDAS → MANDA PRA IA COM PRESSÃO =====
            case 'doubts':
                sendMessage('Tenho dúvidas, quero entender melhor');
                break;

            // ===== "VOU PENSAR" =====
            case 'think':
                setTimeout(function() { typing(function() {
                    addAI('Pensar não resolve o problema.');
                    setTimeout(function() { typing(function() {
                        addAI('Porque enquanto você pensa, os visitantes continuam chegando, tendo dúvida e indo embora.');
                        setTimeout(function() { typing(function() {
                            addAI('A pergunta real é: faz sentido continuar deixando isso acontecer?');
                            setTimeout(function() {
                                showButtons([
                                    { text: '🚀 Não, quero resolver', action: 'pre_close', cta: true },
                                    { text: '💡 Ainda tenho dúvidas', action: 'doubts' }
                                ]);
                            }, 400);
                        }); }, 600);
                    }); }, 600);
                }); }, 300);
                break;

            // ===== PRÉ-FECHAMENTO =====
            case 'pre_close':
                setTimeout(function() { typing(function() {
                    addAI('Pelo que você me falou, isso resolve exatamente o seu cenário. Faz sentido colocar isso no seu negócio agora?');
                    setTimeout(function() {
                        showButtons([
                            { text: '✅ Sim, faz sentido', action: 'close', cta: true },
                            { text: '🤔 Vou pensar', action: 'think' }
                        ]);
                    }, 400);
                }); }, 300);
                break;

            // ===== FECHAMENTO =====
            case 'close':
                setTimeout(function() { typing(function() {
                    addAI('Então vamos direto. Você só precisa criar seu primeiro LinkMágico e já começa a usar.');
                    setTimeout(function() {
                        showButtons([
                            { text: '⚡ Criar meu LinkMágico agora', action: 'final_cta', cta: true }
                        ]);
                    }, 400);
                }); }, 300);
                break;

            // ===== CTA FINAL =====
            case 'final_cta':
                window.open(hotmartLink, '_blank');
                setTimeout(function() { typing(function() {
                    addAI('Você já viu funcionando. Já entendeu o impacto. Agora é só ativar e começar a converter.');
                }); }, 500);
                break;
        }
    }

    // ===== ENVIAR MENSAGEM À IA =====
    async function sendMessage(text) {
        if (sending || !text.trim()) return;
        sending = true; sendBtn.disabled = true;
        addUser(text); msgInput.value = ''; messageCount++;

        var ti = document.createElement('div');
        ti.className = 'typing'; ti.id = 'typingIndicator';
        ti.innerHTML = '<span></span><span></span><span></span>';
        chatBody.appendChild(ti); chatBody.scrollTop = chatBody.scrollHeight;

        try {
            var res = await fetch('/api/chat/' + SESSION_ID, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message: text })
            });
            var data = await res.json();
            var t = document.getElementById('typingIndicator'); if (t) t.remove();

            if (data.limitReached) { showLimit(data.error); return; }
            if (!res.ok) { addSystemMsg('⚠️ ' + (data.error || 'Erro')); return; }

            if (data.messages && data.messages.length > 0) {
                for (var i = 0; i < data.messages.length; i++) {
                    var ti2 = document.createElement('div');
                    ti2.className = 'typing'; ti2.id = 'typingIndicator';
                    ti2.innerHTML = '<span></span><span></span><span></span>';
                    chatBody.appendChild(ti2); chatBody.scrollTop = chatBody.scrollHeight;
                    await new Promise(function(r) { setTimeout(r, 800 + Math.random() * 700); });
                    var t2 = document.getElementById('typingIndicator'); if (t2) t2.remove();

                    var btns = [];
                    if (i === data.messages.length - 1) {
                        btns = buildCloserButtons(data);
                    }

                    var cleanText = data.messages[i];
                    if (data.checkoutLink && btns.length > 0) {
                        cleanText = cleanText.replace(/(https?:\/\/[^\s]+)/g, '').trim();
                        if (!cleanText) cleanText = 'Aqui está o link:';
                    }
                    addAI(cleanText, btns);
                }
            } else {
                addAI(data.response);
            }

            if (data.stats) {
                updateProgress(data.stats.messageCount, data.stats.maxMessages, data.stats.remainingMinutes);
            }

        } catch (err) {
            var t3 = document.getElementById('typingIndicator'); if (t3) t3.remove();
            addSystemMsg('⚠️ Erro de conexão.');
        } finally {
            sending = false; sendBtn.disabled = false; msgInput.focus();
        }
    }

    // ===== BOTÕES CLOSER CONTEXTUAIS =====
    function buildCloserButtons(data) {
        var response = data.response || '';
        var pressureLevel = data.pressureLevel || 1;

        // Checkout link detectado
        if (data.checkoutLink) {
            return [
                { text: '👉 Acessar agora', cta: true, url: data.checkoutLink },
                { text: 'Ainda tenho dúvidas' }
            ];
        }

        // Nível 4 = CTA final
        if (pressureLevel >= 4 || data.stage === 'DECISÃO') {
            return [
                { text: '⚡ Criar meu LinkMágico agora', cta: true, url: data.hotmartLink || hotmartLink },
                { text: 'Ainda tenho uma dúvida' }
            ];
        }

        // Pré-fechamento detectado
        if (/faz sentido|quer.*agora|quer.*ativar|colocar.*negócio/i.test(response)) {
            return [
                { text: '✅ Sim, faz sentido' },
                { text: '🤔 Vou pensar' }
            ];
        }

        // Preço
        if (/pre[çc]o|valor|oferta|investimento/i.test(response)) {
            return [
                { text: '👉 Ver oferta', cta: true, url: data.hotmartLink || hotmartLink },
                { text: 'Tenho mais dúvidas' }
            ];
        }

        // Nível 3 = push decisão
        if (pressureLevel >= 3) {
            return [
                { text: '🚀 Quero isso', cta: true, url: data.hotmartLink || hotmartLink },
                { text: '💡 Ainda tenho dúvidas' }
            ];
        }

        // Nível 2 = binário
        if (pressureLevel >= 2) {
            return [
                { text: '✅ Faz sentido' },
                { text: '🤔 Ainda não sei' }
            ];
        }

        return [];
    }

    sendBtn.addEventListener('click', function() { sendMessage(msgInput.value.trim()); });
    msgInput.addEventListener('keydown', function(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(msgInput.value.trim()); } });
})();
</script>
</body>
</html>
